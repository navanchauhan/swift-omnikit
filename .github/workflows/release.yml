name: Release AttractorCLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (arm64)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build AttractorCLI
        run: swift build --product AttractorCLI -c release

      - name: Package binary
        run: |
          BIN_PATH=$(swift build --product AttractorCLI -c release --show-bin-path)/AttractorCLI
          cp "$BIN_PATH" AttractorCLI
          chmod +x AttractorCLI
          tar czf AttractorCLI-macos-arm64.tar.gz AttractorCLI

      - uses: actions/upload-artifact@v4
        with:
          name: AttractorCLI-macos-arm64
          path: AttractorCLI-macos-arm64.tar.gz

  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container: swift:6.1-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Build AttractorCLI (static)
        run: swift build --product AttractorCLI -c release --static-swift-stdlib

      - name: Package binary
        run: |
          BIN_PATH=$(swift build --product AttractorCLI -c release --static-swift-stdlib --show-bin-path)/AttractorCLI
          cp "$BIN_PATH" AttractorCLI
          chmod +x AttractorCLI
          tar czf "AttractorCLI-linux-${{ matrix.arch }}.tar.gz" AttractorCLI

      - uses: actions/upload-artifact@v4
        with:
          name: AttractorCLI-linux-${{ matrix.arch }}
          path: AttractorCLI-linux-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: AttractorCLI ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
