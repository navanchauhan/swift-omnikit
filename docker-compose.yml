services:
  tui-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DISPLAY=:99
      - OMNIUI_SMOKE_SECONDS=5
      - TERM=xterm-kitty
      - COLORTERM=truecolor
      - TUI_TEST_MODE=${TUI_TEST_MODE:-all}
      - TUI_TEST_UPDATE_BASELINES=${TUI_TEST_UPDATE_BASELINES:-0}
    volumes:
      - ./tests/tui/baselines:/app/tests/tui/baselines
      - ./tests/tui/output:/app/tests/tui/output
    security_opt:
      - seccomp:unconfined
