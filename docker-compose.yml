services:
  tui-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DISPLAY=:99
      - OMNIUI_SMOKE_SECONDS=5
      - TERM=xterm-kitty
      - COLORTERM=truecolor
      - TUI_TEST_MODE=${TUI_TEST_MODE:-all}
      - TUI_TEST_UPDATE_BASELINES=${TUI_TEST_UPDATE_BASELINES:-0}
    volumes:
      - ./Tests/tui/baselines:/app/Tests/tui/baselines
      - ./Tests/tui/output:/app/Tests/tui/output
    security_opt:
      - seccomp:unconfined
  ghostty-lab:
    build:
      context: .
      dockerfile: Dockerfile.ghostty
    environment:
      - DISPLAY=:99
      - GHOSTTY_LAB_COMMAND=${GHOSTTY_LAB_COMMAND:-exec bash -li}
      - GHOSTTY_LAB_FULLSCREEN=${GHOSTTY_LAB_FULLSCREEN:-1}
      - GHOSTTY_LAB_ENABLE_VNC=${GHOSTTY_LAB_ENABLE_VNC:-1}
      - GHOSTTY_LAB_HOST_WORKSPACE=${GHOSTTY_LAB_HOST_WORKSPACE:-}
      - GHOSTTY_LAB_VNC_PORT=5900
      - GHOSTTY_LAB_NOVNC_PORT=6080
      - GHOSTTY_LAB_WORKDIR=/workspace
    ports:
      - "${GHOSTTY_LAB_HOST_VNC_PORT:-5900}:5900"
      - "${GHOSTTY_LAB_HOST_NOVNC_PORT:-6080}:6080"
    volumes:
      - .:/workspace
      - ./Tests/tui/output:/workspace/Tests/tui/output
      - /var/run/docker.sock:/var/run/docker.sock
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
