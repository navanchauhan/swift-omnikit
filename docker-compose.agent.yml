services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: omnikit-agent:latest
    restart: unless-stopped
    command:
      - --mesh-port
      - "9100"
      - --http-ingress-port
      - "8080"
      - --http-ingress-host
      - "0.0.0.0"
      - --telegram-polling
      - --provider
      - openai
      - --model
      - huihui-qwopus3.5-9b-v3-abliterated
    env_file: .env
    environment:
      - THE_AGENT_STATE_ROOT=/data/state
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.agent-data/state:/data/state
      - ./.agent-data/home:/root
      - .:/workspace
    ports:
      - "8180:8080"
      - "9100:9100"

  worker:
    image: omnikit-agent:latest
    restart: unless-stopped
    entrypoint: ["TheAgentWorker"]
    command:
      - --mesh-url
      - http://control-plane:9100
      - --acp-profile
      - codex
      - --acp-model
      - gpt-5.3-codex
    env_file: .env
    environment:
      - THE_AGENT_STATE_ROOT=/data/state
    volumes:
      - ./.agent-data/state:/data/state
      - ./.agent-data/home:/root
      - .:/workspace
    depends_on:
      - control-plane

  supervisor:
    image: omnikit-agent:latest
    restart: unless-stopped
    entrypoint: ["TheAgentSupervisor"]
    command:
      - --interval-seconds
      - "10"
    env_file: .env
    environment:
      - THE_AGENT_STATE_ROOT=/data/state
    volumes:
      - ./.agent-data/state:/data/state
    depends_on:
      - control-plane
